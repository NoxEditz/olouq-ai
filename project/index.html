<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#020c04" />
  <title>بدر AI — مساعدك الذكي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════
   أنا حافظت على كل الـ CSS بتاعك هنا عشان الشكل ميتغيرش
   ═══════════════════════════════════════════════════ */
:root {
  --bg0:        #020c04;
  --bg1:        #041208;
  --bg2:        #071a0a;
  --bg3:        #0a2010;
  --card:       #081509;
  --card-hover: #0c1e0d;
  --border:     rgba(0,255,65,.12);
  --border-md:  rgba(0,255,65,.25);
  --ng:         #00ff41;
  --txt0:       #e2ffe6;
  --txt1:       #9dd4a3;
  --txt2:       #4f8a56;
  --txt3:       #2d5232;
  --danger:     #ff3a5c;
  --radius:     14px;
  --radius-sm:  8px;
  --sidebar-w:  272px;
  --header-h:   58px;
  --trans:      .22s cubic-bezier(.4,0,.2,1);
  --font-ui:    'Cairo', sans-serif;
  --font-hd:    'Orbitron', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  background: var(--bg0);
  color: var(--txt0);
  min-height: 100dvh;
  overflow: hidden;
}
.hidden { display: none !important; }

/* Matrix Background Effect */
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.1; }

/* App Layout */
#app { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: row; }

#sidebar {
  width: var(--sidebar-w);
  background: linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 100%);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: transform var(--trans);
}

#main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(ellipse at 50% 0%, #051a09 0%, var(--bg0) 60%); }

#main-header {
  height: var(--header-h); padding: 0 20px;
  display: flex; align-items: center; border-bottom: 1px solid var(--border);
  background: rgba(2,12,4,.85); backdrop-filter: blur(12px);
}

#messages-container { flex: 1; overflow-y: auto; padding: 20px; }
.msg-row { display: flex; margin-bottom: 20px; gap: 10px; }
.msg-row.user { flex-direction: row-reverse; }
.msg-bubble { 
  max-width: 70%; padding: 12px 16px; border-radius: var(--radius); 
  background: var(--card); border: 1px solid var(--border);
}
.msg-row.user .msg-bubble { background: #003f10; }

#input-area { padding: 15px; border-top: 1px solid var(--border); background: var(--bg1); }
.input-row { display: flex; gap: 10px; }
#user-input { 
  flex: 1; padding: 12px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: white; outline: none;
}
#send-btn { background: var(--ng); color: black; padding: 0 20px; border-radius: var(--radius-sm); font-weight: bold; }

/* شاشة الـ Setup مخفية تماماً */
#setup-screen { display: none; }
</style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div id="app">
    <aside id="sidebar">
      <div style="padding: 20px; border-bottom: 1px solid var(--border);">
        <h2 style="font-family: var(--font-hd); color: var(--ng); font-size: 18px;">BADR AI</h2>
      </div>
      <div id="chat-history" style="flex: 1; overflow-y: auto; padding: 10px;">
        </div>
      <div style="padding: 15px; border-top: 1px solid var(--border);">
        <button id="new-chat-btn" style="width:100%; color:var(--ng); border:1px solid var(--ng); padding:8px; border-radius:8px;">+ محادثة جديدة</button>
      </div>
    </aside>

    <main id="main">
      <header id="main-header">
        <div style="color: var(--ng); font-family: var(--font-hd);">Badr AI - Online</div>
      </header>

      <div id="messages-container">
        <div id="messages-list">
            </div>
      </div>

      <div id="input-area">
        <div class="input-row">
          <textarea id="user-input" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
          <button id="send-btn">إرسال</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { streamChat, Storage } from './chat.js';

    const $ = id => document.getElementById(id);
    const $messagesList = $('messages-list');
    const $userInput = $('user-input');
    const $sendBtn = $('send-btn');
    const $newChatBtn = $('new-chat-btn');

    let state = {
      chats: Storage.loadChats(),
      activeChatId: null,
      streaming: false
    };

    function initApp() {
      if (state.chats.length > 0) {
        loadChat(state.chats[state.chats.length - 1].id);
      } else {
        newChat();
      }
      renderSidebar();
    }

    function newChat() {
      const id = Date.now();
      const chat = { id, title: 'محادثة جديدة', messages: [] };
      state.chats.push(chat);
      state.activeChatId = id;
      renderSidebar();
      renderMessages();
    }

    function loadChat(id) {
      state.activeChatId = id;
      renderSidebar();
      renderMessages();
    }

    function renderSidebar() {
      $('chat-history').innerHTML = state.chats.map(c => `
        <div onclick="window.loadChat(${c.id})" style="padding:10px; cursor:pointer; color:${c.id === state.activeChatId ? 'var(--ng)' : 'white'}">
          ${c.title}
        </div>
      `).join('');
    }
    window.loadChat = loadChat;

    function renderMessages() {
      const chat = state.chats.find(c => c.id === state.activeChatId);
      if (!chat) return;
      
      $messagesList.innerHTML = chat.messages.map(m => `
        <div class="msg-row ${m.role}">
          <div class="msg-bubble">${m.content}</div>
        </div>
      `).join('');
      $('messages-container').scrollTop = $('messages-container').scrollHeight;
    }

    async function sendMessage() {
      const text = $userInput.value.trim();
      if (!text || state.streaming) return;

      const chat = state.chats.find(c => c.id === state.activeChatId);
      chat.messages.push({ role: 'user', content: text });
      $userInput.value = '';
      
      const assistantMsg = { role: 'assistant', content: '' };
      chat.messages.push(assistantMsg);
      renderMessages();

      state.streaming = true;
      try {
        const stream = streamChat({ messages: chat.messages });
        for await (const chunk of stream) {
          assistantMsg.content += chunk;
          renderMessages();
        }
      } catch (err) {
        assistantMsg.content = "حصلت مشكلة في الاتصال بالسيرفر.. اتأكد إنك رفعت ملف server.js صح.";
        renderMessages();
      } finally {
        state.streaming = false;
        Storage.saveChats(state.chats);
      }
    }

    $sendBtn.addEventListener('click', sendMessage);
    $userInput.addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });
    $newChatBtn.addEventListener('click', newChat);

    initApp();
  </script>
</body>
</html>
