<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - الصفحة غير موجودة | علوق الثانوية</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#020c04" />
  <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;400;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #070a08;
      --ng: #00e676;
      --txt0: #f0fdf4;
      --txt2: #86efac;
      --font-ui: 'Outfit', sans-serif;
      --font-hd: 'Readex Pro', sans-serif;
    }
    body {
      font-family: var(--font-ui), var(--font-hd), sans-serif;
      background: var(--bg0);
      color: var(--txt0);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .error-code {
      font-size: 150px;
      font-weight: 800;
      color: var(--ng);
      margin: 0;
      line-height: 1;
      text-shadow: 0 0 30px rgba(0, 230, 118, 0.4);
    }
    h2 {
      font-size: 30px;
      margin-top: 20px;
      margin-bottom: 10px;
    }
    p {
      color: var(--txt2);
      font-size: 18px;
      margin-bottom: 40px;
    }
    .home-btn {
      display: inline-block;
      padding: 15px 35px;
      background: var(--ng);
      color: var(--bg0);
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 18px;
      transition: all 0.3s;
      box-shadow: 0 5px 20px rgba(0, 230, 118, 0.3);
    }
    .home-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 230, 118, 0.5);
    }
  </style>
</head>
<body>
  <h1 class="error-code">404</h1>
  <h2>عذراً، الصفحة غير موجودة</h2>
  <p>يبدو أن الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
  <a href="/" class="home-btn">العودة للصفحة الرئيسية 🚀</a>
</body>
</html>
